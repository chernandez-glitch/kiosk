<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ONEFix · Activar acceso</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#0B1221; overflow:hidden; }
    #ld {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      background:#0B1221; color:#94a3b8;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      transition:opacity .4s; z-index:2;
    }
    #ld.hide { opacity:0; pointer-events:none; }
    .sp { width:46px; height:46px; border:4px solid rgba(96,165,250,.15);
      border-top-color:#60A5FA; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #app { position:fixed; inset:0; width:100%; height:100%; border:0; z-index:1; }
  </style>
</head>
<body>
  <div id="ld">
    <div class="sp"></div>
    <p>Cargando ONEFix...</p>
  </div>
  <iframe id="app" allow="clipboard-write"></iframe>

  <script>
    // URL del deployment /exec de producción (Honduras). NO lleva /u/N/.
    var GAS = 'https://script.google.com/macros/s/AKfycbwoHAEtrZWuPDlv8x8mvuYL6PmWtUbvIoT1kQG6LyBd6vgNNdBolphU9hE8g2IABEdZ/exec';

    // Pasa TODO lo que venga en la URL de esta página (?token=...) directamente
    // al iframe que apunta al /exec real. Google no reescribe el src de un iframe,
    // así que nunca aparece el /u/3/.
    var qs = window.location.search || '';
    var iframe = document.getElementById('app');
    iframe.src = GAS + qs;

    iframe.addEventListener('load', function() {
      var ld = document.getElementById('ld');
      if (ld) ld.classList.add('hide');
    });
  </script>
</body>
</html>
